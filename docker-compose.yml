services:
  app:
    build:
      context: .
      target: dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: local
      DEFAULT_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      POSTGRES_DSN: postgresql://agent:secret@postgres:5432/agentforge
      REDIS_URL: redis://redis:6379
      VECTOR_DB_URL: http://qdrant:6333
      CONTEXT_SOURCE: github
      JIRA_URL: http://jira-mock:8080
      CONFLUENCE_URL: http://confluence-mock:8081
      WORKSPACE_ROOT: /workspace
    env_file:
      # Optional: local secrets (GITHUB_TOKEN, ANTHROPIC_API_KEY, ...) layered
      # on top of the `environment:` block above. `required: false` means a
      # fresh clone or CI (which never creates a .env) still resolves fine.
      - path: .env
        required: false
    volumes:
      - .:/workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: agentforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  jira-mock:
    image: node:20-alpine
    command: npx @volter/twin-jira serve --port 8080
    ports:
      - "8080:8080"
    environment:
      - JIRA_TWIN_ROOT=/data
    volumes:
      - ./test-data/jira:/data

  confluence-mock:
    image: node:20-alpine
    command: npx @mhmdalimansour/mock-mock --url file:///app/confluence-docs.html --port 8081
    ports:
      - "8081:8081"
    volumes:
      - ./test-data/confluence:/app

volumes:
  ollama-data:
  postgres-data:
  redis-data:
  qdrant-data:
