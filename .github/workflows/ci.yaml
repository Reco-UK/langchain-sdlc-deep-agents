name: CI

on: [push, pull_request]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ci
      POSTGRES_DSN: "sqlite:///memory.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy --strict)
        run: mypy app/

      - name: Unit + eval tests
        run: pytest tests/unit tests/eval --cov=app --cov-report=term-missing

      - name: Start docker compose services
        run: docker compose -f docker-compose.yml up -d postgres redis qdrant jira-mock confluence-mock

      - name: Wait for postgres
        timeout-minutes: 5
        run: |
          until docker compose exec -T postgres pg_isready -U agent -d agentforge; do sleep 2; done

      - name: Integration tests
        env:
          POSTGRES_DSN: "postgresql://agent:secret@localhost:5432/agentforge"
          REDIS_URL: "redis://localhost:6379"
          VECTOR_DB_URL: "http://localhost:6333"
          JIRA_URL: "http://localhost:8080"
          CONFLUENCE_URL: "http://localhost:8081"
        run: pytest tests/integration -m integration

      - name: Tear down docker compose services
        if: always()
        run: docker compose -f docker-compose.yml down
